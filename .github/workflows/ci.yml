name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  sensitive-file-guard:
    name: Sensitive file guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect forbidden file changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [[ "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            changed_files="$(git ls-tree -r --name-only "$head_sha")"
          else
            changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
          fi

          forbidden_files="$(printf '%s\n' "$changed_files" | grep -E '(^|/)\.env$|(^|/)auth_info(/|$)|(^|/)baileys_auth(/|$)|(^|/)session(s)?(/|$)|(^|/)\.session(s)?(/|$)|^backend/data/.*\.json$' || true)"

          if [[ -n "$forbidden_files" ]]; then
            echo "Forbidden sensitive/runtime files were changed:"
            printf '%s\n' "$forbidden_files"
            echo "Do not commit real .env files, auth/session folders, or local runtime JSON data. .env.example is allowed."
            exit 1
          fi

          echo "No forbidden sensitive/runtime files changed."

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: sensitive-file-guard
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python files
        run: python -m compileall .

      - name: Run backend tests
        run: python -m pytest

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: sensitive-file-guard
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build
